      .psi { font-family: Georgia, 'Times New Roman', serif; font-size: 52px; font-weight: bold; fill: #3AAFA9; }
      .nome { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #1B2D4F; letter-spacing: 1px; }
      .crp  { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; font-weight: 400; fill: #3AAFA9; letter-spacing: 2px; }
